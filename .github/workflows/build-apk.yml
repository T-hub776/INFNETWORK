name: Compile INF WIFI APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  compile-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 🚀 THE MAGIC FIX STEP: Generates a perfectly clean, official binary jar on-the-fly!
    - name: Auto-Generate Official Gradle Wrapper Binary
      run: |
        gradle wrapper --gradle-version 8.5

    - name: Grant Execute Permission to Script
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: INF-WIFI-App
        path: app/build/outputs/apk/debug/app-debug.apk
        
